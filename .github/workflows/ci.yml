name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: raggate
          POSTGRES_PASSWORD: raggate_secret
          POSTGRES_DB: raggate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('rag_gate/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd rag_gate
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://raggate:raggate_secret@localhost:5432/raggate
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          OPENAI_API_KEY: sk-test-key
        run: |
          cd rag_gate
          python manage.py migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://raggate:raggate_secret@localhost:5432/raggate
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          OPENAI_API_KEY: sk-test-key
        run: |
          cd rag_gate
          python -m pytest tests/ --ds=core.test_settings -v

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: rag_gate-ui/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd rag_gate-ui
          npm ci

      - name: Build frontend
        run: |
          cd rag_gate-ui
          npm run build