name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('rag_gate/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd rag_gate
          pip install -r requirements.txt

      - name: Run Tests
        env:
          SECRET_KEY: "ci-test-key-checksum-safeguard"
          DEBUG: "False"
          OPENAI_API_KEY: "mock-key"
          ANTHROPIC_API_KEY: "mock-key"
        run: |
          cd rag_gate
          python -m pytest tests/ --ds=core.test_settings -v

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: rag_gate-ui/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd rag_gate-ui
          npm ci

      - name: Build frontend
        run: |
          cd rag_gate-ui
          npm run build